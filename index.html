<script>
  window.addEventListener('message', (e) => {
    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');
    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  function applyTweaks() {
    const accent = document.getElementById('tw-accent').value;
    const font = document.getElementById('tw-font').value;
    const bg = document.getElementById('tw-bg').value;
    document.body.style.background = bg;
    document.body.style.fontFamily = font + ', sans-serif';
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: accent, fontStyle: font, bgTone: bg } }, '*');
  }
</script>

function TypeWriter({ text, speed = 50, delay = 300 }) {
  const [displayed, setDisplayed] = useState('');
  const [done, setDone] = useState(false);
  const prevText = useRef('');
  useEffect(() => {
    if (prevText.current === text) return;
    prevText.current = text;
    setDisplayed(''); setDone(false);
    let i = 0;
    const timeout = setTimeout(() => {
      const interval = setInterval(() => {
        setDisplayed(text.slice(0, i + 1));
        i++;
        if (i >= text.length) { clearInterval(interval); setDone(true); }
      }, speed);
      return () => clearInterval(interval);
    }, delay);
    return () => clearTimeout(timeout);
  }, [text]);
  return <span>{displayed}{!done && <span className="cursor">▌</span>}</span>;
}

function LangToggle() {
  const { lang, setLang } = useContext(LangCtx);
  return (
    <div className="lang-toggle">
      <button className={`lang-btn ${lang === 'en' ? 'active' : ''}`} onClick={() => setLang('en')}>EN</button>
      <button className={`lang-btn ${lang === 'tr' ? 'active' : ''}`} onClick={() => setLang('tr')}>TR</button>
    </div>
  );
}

function Nav() {
  const { t } = useContext(LangCtx);
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const closeMenu = () => setMenuOpen(false);
  return (
    <>
      <nav className="nav-bar" style={{
        position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 48px', height: 60,
        background: (scrolled || menuOpen) ? 'rgba(10,10,11,0.97)' : 'transparent',
        backdropFilter: (scrolled || menuOpen) ? 'blur(12px)' : 'none',
        borderBottom: (scrolled || menuOpen) ? '1px solid #18181c' : '1px solid transparent',
        transition: 'all 0.3s',
      }}>
        <span className="mono" style={{ fontSize: 13, color: '#444', letterSpacing: '0.05em' }}>
          eb<span style={{ color: ACCENT }}>_</span>
        </span>
        {/* Desktop nav */}
        <div className="nav-links-desktop" style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
          {t.nav.map((label, i) => (
            <a key={i} href={t.navHrefs[i]} className="nav-link">{label}</a>
          ))}
          <LangToggle />
        </div>
        {/* Mobile right: lang + hamburger */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ display: 'none' }} className="lang-toggle-mobile"><LangToggle /></div>
          <button className="hamburger" onClick={() => setMenuOpen(o => !o)} aria-label="menu">
            <span style={{ transform: menuOpen ? 'rotate(45deg) translate(5px,5px)' : 'none' }}/>
            <span style={{ opacity: menuOpen ? 0 : 1 }}/>
            <span style={{ transform: menuOpen ? 'rotate(-45deg) translate(5px,-5px)' : 'none' }}/>
          </button>
        </div>
      </nav>
      {/* Mobile dropdown */}
      <div className={`mobile-menu${menuOpen ? ' open' : ''}`}>
        {t.nav.map((label, i) => (
          <a key={i} href={t.navHrefs[i]} className="nav-link" onClick={closeMenu}>{label}</a>
        ))}
        <div style={{ marginTop: 4 }}><LangToggle /></div>
      </div>
    </>
  );
}

function Hero() {
  const { t } = useContext(LangCtx);
  return (
    <section className="hero-section" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', padding: '0 48px', maxWidth: 860, margin: '0 auto' }}>
      <div className="fade-up" style={{ width: '100%' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20, marginBottom: 32 }}>
          <Avatar />
          <div>
            <div className="mono section-label" style={{ marginBottom: 4, color: ACCENT }}>
              {t.heroTag}
            </div>
            <div style={{ fontSize: 13, color: '#555' }}>{t.heroSub}</div>
          </div>
        </div>

        <h1 style={{ fontSize: 'clamp(44px, 7vw, 80px)', fontWeight: 300, letterSpacing: '-0.03em', lineHeight: 1.05, color: '#f0ece5', marginBottom: 16 }}>
          Ege Bilir
        </h1>

        <p className="mono" style={{ fontSize: 'clamp(13px, 1.8vw, 16px)', color: '#555', marginBottom: 28, letterSpacing: '0.02em' }}>
          <TypeWriter text={t.heroTyped} speed={45} delay={200} />
        </p>

        <p style={{ fontSize: 15, color: '#777', lineHeight: 1.8, maxWidth: 520, marginBottom: 40 }}>
          {t.heroBio}
        </p>

        <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap' }}>
          <a href="https://www.linkedin.com/in/ege-bilir-b17413158/" target="_blank" rel="noopener noreferrer"
            onClick={e => { e.preventDefault(); window.open('https://www.linkedin.com/in/ege-bilir-b17413158/', '_blank'); }}

function App() {
  const [lang, setLang] = useState(() => localStorage.getItem('portfolio-lang') || 'en');
  const t = T[lang];
  const handleSetLang = (l) => { setLang(l); localStorage.setItem('portfolio-lang', l); };

  return (
    <LangCtx.Provider value={{ lang, t, setLang: handleSetLang }}>
      <Nav />
      <Hero />
      <About />
      <Projects />
      <Contact />
    </LangCtx.Provider>
  );
}
